<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111111" />
    <meta
      name="description"
      content="Finnja Krämer — Editorial Portfolio mit interaktiven Projekten, 3D Arbeiten und Creative Systems."
    />
    <title>Finnja Krämer — Portfolio</title>

    <!-- Favicons -->
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon-180x180.png?v=3" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png?v=3" />
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png?v=3" />
    <link rel="icon" href="./favicon.ico?v=3" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg?v=3" />
    <link rel="manifest" href="./site.webmanifest?v=3" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#home">Zum Inhalt springen</a>
    <div class="noise" aria-hidden="true"></div>
    <div class="cursor-glow" aria-hidden="true"></div>

    <header class="nav">
      <nav class="nav__inner" aria-label="Primary navigation">
        <a class="nav__brand" href="#home" data-magnet>
          <span class="nav__logo">FK</span>
          <span class="nav__name">Finnja Krämer</span>
        </a>
        <div class="nav__links">
          <a class="nav__link" href="#home">Home</a>
          <a class="nav__link" href="#about">About</a>
          <a class="nav__link" href="#projects">Projects</a>
          <a class="nav__link" href="#contact-page">Contact</a>
        </div>
        <button class="nav__hamburger" aria-label="Menü" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </nav>
    </header>

    <main>
      <!-- ─── Hero ─── -->
      <section id="home" class="section hero">
        <div class="hero__backtype" aria-hidden="true">
          <span>FINNJA</span>
          <span>KRAEMER</span>
        </div>

        <div class="container hero__grid">
          <div class="hero__content">
            <h1 class="hero__title reveal" data-split data-content="hero.title"></h1>
            <p class="hero__subtitle reveal" data-split data-content="hero.subtitle"></p>
            <p class="hero__copy reveal" data-split data-content="hero.copy"></p>
          </div>

          <div class="hero__portraitWrap reveal" data-tilt>
            <div class="hero__portraitGlass">
              <img class="hero__portrait" src="./IMG_1755.jpeg" alt="Portrait von Finnja" />
            </div>
            <a href="#about" class="btn hero__aboutBtn" data-magnet>
              About Me <span aria-hidden="true">→</span>
            </a>
          </div>
        </div>

        <div class="hero__floaters" aria-hidden="true">
          <div class="floater floater--a" data-float></div>
          <div class="floater floater--b" data-float></div>
        </div>
      </section>

      <!-- ─── Skills ─── -->
      <section class="section skills">
        <div class="container">
          <p class="kicker reveal" data-split>Skills</p>
          <h2 class="sectionTitle reveal" data-split>TOOLS, SYSTEMS, CRAFT</h2>
          <div class="skills__pills" id="skillsPills"></div>
        </div>
      </section>

      <!-- ─── About ─── -->
      <section id="about" class="section about-hero">
        <div class="about-hero__backtype" aria-hidden="true">
          <span>ABOUT</span>
        </div>

        <div class="container about-hero__grid">
          <!-- Left: Text -->
          <div>
            <p class="kicker reveal" data-split>About Me</p>
            <h2 class="about-hero__title reveal" data-split data-content="about.title"></h2>

            <div class="about-hero__bio" id="aboutBio"></div>

            <div class="about-hero__actions reveal">
              <a href="#contact-page" class="btn btn--primary" data-magnet>Get in Touch →</a>
              <a href="#projects" class="btn" data-magnet>View Projects</a>
            </div>
          </div>

          <!-- Right: Image -->
          <div class="about-hero__imgCol reveal" data-tilt>
            <div class="about-hero__imgFrame">
              <img
                class="about-hero__img"
                src="./IMG_2352_web.jpg"
                alt="Finnja Krämer"
              />
            </div>
          </div>
        </div>
      </section>

      <!-- ─── Tools & Skills ─── -->
      <section class="section about-tools">
        <div class="container">
          <p class="kicker reveal" data-split>Background</p>
          <h2 class="sectionTitle reveal" data-split>TOOLS & SKILLS</h2>

          <div class="about-tools__grid" id="toolsGrid"></div>
        </div>
      </section>

      <!-- ─── Projects archive ─── -->
      <section id="projects" class="section allProjects">
        <div class="container">
          <div class="sectionHead">
            <p class="kicker reveal" data-split>All Projects</p>
            <h2 class="sectionTitle reveal" data-split>PROJECT ARCHIVE</h2>
            <p class="projects-count reveal" id="projectsCount"></p>
          </div>

          <div id="projectsContainer"></div>
        </div>
      </section>

      <!-- ─── Contact ─── -->
      <section id="contact-page" class="section contactPage">
        <div class="container contactPage__grid">
          <div>
            <p class="kicker reveal" data-split>Contact</p>
            <h2 class="sectionTitle reveal" data-split data-content="contact.title"></h2>
            <p class="contactPage__copy reveal" data-split data-content="contact.copy"></p>
            <div class="contactPage__links reveal" id="contactLinks"></div>
          </div>

          <form class="contactForm reveal" data-tilt>
            <label>
              Name
              <input type="text" name="name" placeholder="Dein Name" required />
            </label>
            <label>
              E-Mail
              <input type="email" name="email" placeholder="deine@email.de" required />
            </label>
            <label>
              Nachricht
              <textarea name="message" rows="5" placeholder="Erzaehl mir kurz von deinem Projekt"></textarea>
            </label>
            <button type="submit" class="btn btn--primary" data-magnet>Send Message</button>
          </form>
        </div>
      </section>
    </main>

    <!-- Project Modal -->
    <div class="pModal" id="projectModal" hidden role="dialog" aria-modal="true" aria-label="Project Detail">
      <div class="pModal__backdrop"></div>
      <div class="pModal__panel" role="document">
        <button class="pModal__close" aria-label="Close project">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <line x1="1" y1="1" x2="17" y2="17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="17" y1="1" x2="1" y2="17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="pModal__inner">
          <div class="pModal__header">
            <p class="pModal__category"></p>
            <h2 class="pModal__title"></h2>
            <p class="pModal__tech"></p>
          </div>
          <div class="pModal__body">
            <p class="pModal__desc"></p>
          </div>
          <div class="pModal__gallery"></div>
          <div class="pModal__video"></div>
        </div>
      </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" hidden role="dialog" aria-modal="true" aria-label="Image lightbox">
      <div class="lightbox__bg"></div>
      <div class="lightbox__wrap">
        <img class="lightbox__img" src="" alt="" />
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/bundled/lenis.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
